<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-commerce contact page</title>
</head>
<body>
    <div class="contact-container">
        <div class="Contact-info">
            <h2>Contact Us</h2>
            <p>Have a question? Send us a message. We're here to help.</p>

            <div class="info-item">
                <strong>📍 Address:</strong>123,Main Street,Colombo,Sri lanka.
            </div>

            <div class="info-item">
                <strong>📞 Phone:</strong>+94 112 342 5678
            </div>

            <div class="info-item">
                <strong>✉️ Email:</strong> support@ecommerce.com
            </div>

            <div class="info-item">
                <strong>⏰ Hours:</strong> Mon - Sat: 9:00 AM - 6:00 PM
            </div>
        </div>

        <div class="contact-form">
            <h2>Send a Message</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here...." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Your Message </button>
            </form>
        </div>
    </div>
    
    
</body>
</html>
